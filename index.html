<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Mi Tracker"/>
<meta name="theme-color" content="#F7F6F3"/>
<title>Mi Tracker Freelance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F7F6F3;--bg2:#EEECEA;--bg3:#E3E1DD;--card:#FFFFFF;
  --border:#D9D7D2;--border2:#EEECEA;
  --text:#1A1916;--text2:#6B6963;--text3:#9A9790;
  --green:#1A7F5A;--green-bg:#E4F4EC;
  --red:#C0392B;--red-bg:#FCEAE8;
  --amber:#A05C00;--amber-bg:#FDF0DC;
  --blue:#1A5FA0;--blue-bg:#E4EEF9;
  --purple:#5A3FA0;--purple-bg:#EDEAF9;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1A1916;--bg2:#242320;--bg3:#2E2C28;--card:#242320;
    --border:#3A3834;--border2:#2E2C28;
    --text:#F0EDE8;--text2:#9A9790;--text3:#6B6963;
    --green:#2DB87A;--green-bg:#0D2E1F;
    --red:#E05A4E;--red-bg:#2E1210;
    --amber:#E09030;--amber-bg:#2E1F08;
    --blue:#4A9AE0;--blue-bg:#0D1E30;
    --purple:#9A80E0;--purple-bg:#1A1430;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:15px;line-height:1.5}
.app{max-width:680px;margin:0 auto;padding:16px 16px 100px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.header h1{font-size:18px;font-weight:600;flex:1}
.month-sel{font-size:14px;font-weight:500;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;box-shadow:var(--shadow)}
.tc-wrap{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.tc-wrap input{width:68px;font-size:13px;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);text-align:right}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.metrics-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.met{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);border:1px solid var(--border2)}
.met-lbl{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.met-val{font-size:17px;font-weight:600}
.met-sub{font-size:11px;color:var(--text3);margin-top:2px}
.col-g{color:var(--green)}.col-r{color:var(--red)}.col-b{color:var(--blue)}.col-o{color:var(--amber)}.col-p{color:var(--purple)}
.pbar-wrap{margin-bottom:16px;background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);border:1px solid var(--border2)}
.pbar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.pbar{height:7px;border-radius:4px;background:var(--bg2);overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.tabs{display:flex;gap:0;margin-bottom:16px;background:var(--bg2);border-radius:var(--radius-sm);padding:3px}
.tab{flex:1;font-size:13px;font-weight:500;padding:8px;border:none;background:none;color:var(--text2);cursor:pointer;border-radius:calc(var(--radius-sm) - 2px);transition:all .2s}
.tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border2);margin-bottom:12px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:8px;padding:14px 16px 0;font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.card-body{padding:12px 16px 16px}
.proj-item{background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;border:1px solid var(--border2)}
.proj-item:last-child{margin-bottom:0}
.proj-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.proj-name{flex:1;font-weight:600;font-size:14px;word-break:break-word}
.proj-actions{display:flex;gap:4px;flex-shrink:0}
.proj-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
.proj-row2{display:flex;align-items:center;justify-content:space-between;gap:8px}
.proj-nota{font-size:12px;color:var(--text2);font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid var(--border2)}
.prog-wrap{display:flex;align-items:center;gap:8px;flex:1}
.prog-track{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--green)}
.prog-pct{font-size:11px;color:var(--text2);min-width:28px;text-align:right}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap;letter-spacing:.2px}
.b-conf{background:var(--green-bg);color:var(--green)}.b-noconf{background:var(--bg2);color:var(--text2)}
.b-prop{background:var(--blue-bg);color:var(--blue)}.b-pago{background:var(--green-bg);color:var(--green)}
.b-nopago{background:var(--red-bg);color:var(--red)}.b-parcial{background:var(--amber-bg);color:var(--amber)}
.cur-tag{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;margin-left:3px}
.tag-usd{background:var(--green-bg);color:var(--green)}.tag-crc{background:var(--blue-bg);color:var(--blue)}
.dias-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--amber-bg);color:var(--amber)}
.dias-badge.old{background:var(--red-bg);color:var(--red)}
.check-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border2)}
.check-item:last-child{border-bottom:none}
.check-item.done .ci-name{text-decoration:line-through;opacity:.5}
.ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ci-name{flex:1;font-size:14px;font-weight:500}
.ci-note{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:4px;padding:2px 6px}
.ci-amt{font-size:13px;font-weight:600;color:var(--red);min-width:80px;text-align:right}
.ci-check{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.ibtn{background:none;border:none;cursor:pointer;padding:6px;border-radius:var(--radius-sm);font-size:15px;color:var(--text2);line-height:1;transition:all .15s}
.ibtn:hover,.ibtn:active{background:var(--bg2)}
.ibtn.del:active{color:var(--red)}.ibtn.edit:active{color:var(--blue)}.ibtn.save:active{color:var(--green)}
.add-form{margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-row input,.form-row select{font-size:14px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--blue)}
.inp-f{flex:1;min-width:120px}.inp-md{width:130px}.inp-sm{width:90px}.inp-xs{width:70px}
.btn-add{width:100%;padding:11px;font-size:14px;font-weight:600;border-radius:var(--radius-sm);border:none;background:var(--text);color:var(--bg);cursor:pointer;transition:opacity .2s}
.btn-add:active{opacity:.8}
.iva-box{background:var(--red-bg);border:1px solid #F0A0A0;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.iva-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}
.iva-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(192,57,43,.15)}
.iva-row:last-child{border:none;font-weight:700;padding-top:8px}
.iva-label{color:var(--text2)}.iva-val{color:var(--red);font-weight:600}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px}
.bar-mo{width:36px;color:var(--text2);text-align:right;font-weight:500;flex-shrink:0}
.bar-group{flex:1;display:flex;flex-direction:column;gap:3px}
.bar-track{height:12px;background:var(--bg2);border-radius:3px;overflow:hidden}
.bar-fill-g{height:100%;border-radius:3px;background:var(--green);transition:width .4s}
.bar-fill-r{height:100%;border-radius:3px;background:var(--red);transition:width .4s}
.bar-nums{display:flex;gap:8px;font-size:11px;margin-top:2px}
.num-g{color:var(--green);font-weight:500}.num-r{color:var(--red);font-weight:500}.num-dim{color:var(--text3)}
.legend{display:flex;gap:14px;margin-bottom:14px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2);font-size:14px}
.summary-row:last-child{border:none}
.sum-label{color:var(--text2)}
.edit-form{background:var(--bg2);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.edit-form .form-row{margin-bottom:6px}
.edit-actions{display:flex;gap:8px;margin-top:8px}
.btn-save{flex:1;padding:9px;font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;cursor:pointer}
.btn-cancel{padding:9px 16px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer}
.data-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.data-btn{flex:1;min-width:100px;padding:9px 10px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:var(--shadow)}
.data-btn:active{opacity:.8}
.data-btn.excel{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.empty-msg{font-size:13px;color:var(--text3);padding:8px 0;font-style:italic}
.view{display:none}.view.active{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:13px;font-weight:500;padding:10px 20px;border-radius:30px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.metrics-grid,.metrics-grid3{grid-template-columns:1fr 1fr}.met-val{font-size:15px}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>📊 Mi Tracker</h1>
    <select id="monthSel"></select>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="tc-wrap"><span>TC $1 =</span><input type="number" id="tcInput" value="450" min="1" step="1"/><span>₡</span></div>
    <div class="data-bar" style="margin:0">
      <button class="data-btn excel" onclick="exportXLSX()"><i class="ti ti-file-spreadsheet"></i> Excel</button>
      <button class="data-btn" onclick="exportJSON()"><i class="ti ti-download"></i> Backup</button>
      <button class="data-btn" onclick="document.getElementById('importFile').click()"><i class="ti ti-upload"></i> Importar</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
    </div>
  </div>

  <div class="metrics-grid">
    <div class="met"><div class="met-lbl">Cobrado</div><div class="met-val col-g" id="mCob">₡0</div></div>
    <div class="met"><div class="met-lbl">Por cobrar</div><div class="met-val col-o" id="mPend">₡0</div></div>
    <div class="met"><div class="met-lbl">Gastos pagados</div><div class="met-val col-r" id="mGPag">₡0</div></div>
    <div class="met"><div class="met-lbl">Por pagar</div><div class="met-val col-r" id="mGPend">₡0</div></div>
  </div>
  <div class="metrics-grid3">
    <div class="met"><div class="met-lbl">Balance real</div><div class="met-val col-b" id="mBal">₡0</div></div>
    <div class="met"><div class="met-lbl">Optimista</div><div class="met-val col-p" id="mOpt">₡0</div><div class="met-sub">si todo entra</div></div>
    <div class="met"><div class="met-lbl">IVA a pagar</div><div class="met-val col-r" id="mIva">₡0</div></div>
  </div>

  <div class="pbar-wrap" id="pbarWrap" style="display:none">
    <div class="pbar-labels"><span>Comprometido de lo cobrado</span><span id="pbarPct"></span></div>
    <div class="pbar"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('mes',this)">Este mes</button>
    <button class="tab" onclick="switchTab('anual',this)">Vista anual</button>
  </div>

  <div id="view-mes" class="view active">
    <div class="card">
      <div class="card-header"><i class="ti ti-briefcase" style="color:var(--blue)"></i> Proyectos</div>
      <div class="card-body">
        <div id="proyList"></div>
        <div class="add-form">
          <div class="form-row"><input type="text" id="pNombre" placeholder="Cliente / proyecto" class="inp-f"/></div>
          <div class="form-row">
            <input type="text" id="pFechas" placeholder="Fechas" class="inp-md"/>
            <select id="pEstado" class="inp-md">
              <option value="confirmado">Confirmado</option>
              <option value="noconfirmado">Sin confirmar</option>
              <option value="propuesta">En propuesta</option>
            </select>
          </div>
          <div class="form-row">
            <input type="number" id="pMonto" placeholder="Monto" class="inp-f"/>
            <select id="pMoneda" class="inp-xs"><option value="CRC">₡ CRC</option><option value="USD">$ USD</option></select>
            <select id="pFactura" class="inp-sm"><option value="0">Sin factura</option><option value="1">Con factura</option></select>
          </div>
          <div class="form-row">
            <input type="text" id="pNota" placeholder="Nota (ej. paga a 30 días...)" class="inp-f"/>
            <input type="date" id="pFechaProp" class="inp-md"/>
          </div>
          <button class="btn-add" onclick="addProyecto()">+ Agregar proyecto</button>
        </div>
      </div>
    </div>

    <div class="iva-box" id="ivaBox" style="display:none">
      <div class="iva-title"><i class="ti ti-receipt-tax"></i> IVA a pagar a Hacienda</div>
      <div id="ivaList"></div>
    </div>

    <div class="card">
      <div class="card-header"><i class="ti ti-lock" style="color:var(--red)"></i> Gastos fijos — <span id="fixedSub" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
      <div class="card-body"><div id="fixedList"></div></div>
    </div>

    <div class="card">
      <div class="card-header"><i class="ti ti-receipt" style="color:var(--text2)"></i> Gastos variables</div>
      <div class="card-body">
        <div id="varList"></div>
        <div class="add-form">
          <div class="form-row">
            <input type="text" id="vDesc" placeholder="Descripción" class="inp-f"/>
            <input type="number" id="vAmt" placeholder="Monto" class="inp-sm"/>
            <select id="vMoneda" class="inp-xs"><option value="CRC">₡ CRC</option><option value="USD">$ USD</option></select>
          </div>
          <button class="btn-add" onclick="addVar()">+ Agregar gasto</button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-anual" class="view">
    <div class="card">
      <div class="card-header"><i class="ti ti-chart-bar" style="color:var(--green)"></i> Cobrado vs gastos — <span id="anualYear" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
      <div class="card-body">
        <div class="legend">
          <span><span class="leg-dot" style="background:var(--green)"></span>Cobrado</span>
          <span><span class="leg-dot" style="background:var(--red)"></span>Gastos pagados</span>
        </div>
        <div id="anualChart"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><i class="ti ti-calculator" style="color:var(--purple)"></i> Resumen del año</div>
      <div class="card-body" id="anualResumen"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_S=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const IVA=0.13;

const FIXED=[
  {id:'casa',name:'Casa',color:'#C0392B',active:()=>true,
    amountFn:(y,m)=>(y===2026&&(m===5||m===6))?600000:325000,
    note:(y,m)=>(y===2026&&(m===5||m===6))?'jun-jul especial':null},
  {id:'luz',name:'Luz',color:'#A05C00',active:()=>true,amountFn:()=>30000},
  {id:'tebo',name:'Préstamo Tebo',color:'#5A3FA0',
    active:(y,m)=>!(y===2026&&m===5)&&!(y>2026||(y===2026&&m>7)),
    amountFn:()=>125000,note:(y,m)=>(y===2026&&m===7)?'último mes':null},
  {id:'mami',name:'Plata mami',color:'#C0548B',active:()=>true,amountFn:()=>100000},
  {id:'seguro',name:'Seguro',color:'#1A5FA0',active:()=>true,amountFn:()=>50000},
  {id:'mark',name:'Plata Mark',color:'#A04020',usd:true,
    active:(y,m)=>{const s=y>2026||(y===2026&&m>=8);const e=y>2028||(y===2028&&m>3);return s&&!e;},
    amountFn:(y,m,tc)=>250*tc,
    note:(y,m)=>{if(y<2026||(y===2026&&m<8))return 'desde sep 2026';const d=(y-2026)*12+(m-8);const l=20-d;return l>0?`${l} cuota${l!==1?'s':''} rest.`:'terminado';}},
  {id:'tel',name:'Teléfono',color:'#1A7F5A',active:()=>true,amountFn:()=>20000},
  {id:'nahui',name:'Comida Nahui',color:'#803060',active:()=>true,amountFn:()=>84000,note:()=>'comida + pastilla'},
];

const PAGO_ORDER=['nopago','medio','completo'];
const PAGO_LABELS={nopago:{label:'Sin pago',cls:'b-nopago'},medio:{label:'50% recibido',cls:'b-parcial'},completo:{label:'100% recibido',cls:'b-pago'}};
const PAGO_PCT={nopago:0,medio:50,completo:100};
const ESTADO_ORDER=['confirmado','noconfirmado','propuesta'];
const ESTADO_LABELS={confirmado:{label:'Confirmado',cls:'b-conf'},noconfirmado:{label:'Sin confirmar',cls:'b-noconf'},propuesta:{label:'En propuesta',cls:'b-prop'}};

const now=new Date();
let cy=now.getFullYear(),cm=now.getMonth(),tc=450;
let data={};
try{const s=localStorage.getItem('tracker_freelance');if(s)data=JSON.parse(s);}catch(e){}

function save(){try{localStorage.setItem('tracker_freelance',JSON.stringify(data));}catch(e){}}
function key(y,m){return `${y??cy}-${String((m??cm)+1).padStart(2,'0')}`;}
function getM(y,m){
  const k=key(y,m);
  if(!data[k])data[k]={proyectos:[],vars:[],fixedPaid:{}};
  if(!data[k].vars)data[k].vars=[];
  if(!data[k].fixedPaid)data[k].fixedPaid={};
  return data[k];
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function fmtCRC(n){return Math.round(n);}
function fmtCRCStr(n){return '₡'+Math.round(n).toLocaleString('es-CR');}
function fmtOrig(a,mon){return mon==='USD'?'$'+Number(a).toLocaleString('en-US'):fmtCRCStr(a);}
function toCol(a,mon){return mon==='USD'?Math.round(a*tc):a;}
function curTag(mon){return mon==='USD'?'<span class="cur-tag tag-usd">USD</span>':'<span class="cur-tag tag-crc">CRC</span>';}
function getFixed(y,m){return FIXED.map(r=>({...r,amt:r.amountFn(y,m,tc),active:r.active(y,m),note:r.note?r.note(y,m):null}));}
function next(arr,cur){const i=arr.indexOf(cur);return arr[(i+1)%arr.length];}
function diasDesde(s){if(!s)return null;return Math.floor((now-new Date(s))/(864e5));}

function calcP(p){
  const col=toCol(p.monto,p.moneda||'CRC');
  const pct=(PAGO_PCT[p.pago]??0)/100;
  const neto=p.factura?Math.round(col/(1+IVA)):col;
  const rec=Math.round(neto*pct);
  const iva=p.factura?Math.round((col-neto)*pct):0;
  return{pct:PAGO_PCT[p.pago]??0,col,neto,rec,iva,pend:neto-rec};
}

function calcMonth(y,m){
  const mo=getM(y,m);const fx=getFixed(y,m);
  let cob=0,pend=0,iva=0,gPag=0,gPend=0;
  mo.proyectos.forEach(p=>{const c=calcP(p);cob+=c.rec;pend+=c.pend;iva+=c.iva;});
  fx.filter(r=>r.active).forEach(r=>{if(mo.fixedPaid[r.id])gPag+=r.amt;else gPend+=r.amt;});
  mo.vars.forEach(v=>{const a=toCol(v.amount,v.moneda||'CRC');if(v.paid)gPag+=a;else gPend+=a;});
  return{cob,pend,iva,gPag,gPend};
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
  if(name==='anual')renderAnual();
}

let editIdx=null;
function render(){
  tc=parseInt(document.getElementById('tcInput').value)||450;
  const t=calcMonth(cy,cm);
  const bal=t.cob-t.gPag;
  const opt=t.cob+t.pend-(t.gPag+t.gPend);
  document.getElementById('mCob').textContent=fmtCRCStr(t.cob);
  document.getElementById('mPend').textContent=fmtCRCStr(t.pend);
  document.getElementById('mGPag').textContent=fmtCRCStr(t.gPag);
  document.getElementById('mGPend').textContent=fmtCRCStr(t.gPend);
  document.getElementById('mIva').textContent=fmtCRCStr(t.iva);
  const bEl=document.getElementById('mBal');bEl.textContent=fmtCRCStr(bal);bEl.className='met-val '+(bal>=0?'col-b':'col-r');
  const oEl=document.getElementById('mOpt');oEl.textContent=fmtCRCStr(opt);oEl.className='met-val '+(opt>=0?'col-p':'col-r');
  const pw=document.getElementById('pbarWrap');
  if(t.cob>0){
    pw.style.display='block';
    const pct=Math.min(100,Math.round((t.gPag/t.cob)*100));
    document.getElementById('pbarPct').textContent=pct+'% de lo cobrado en gastos';
    const f=document.getElementById('pbarFill');
    f.style.width=pct+'%';f.style.background=pct>90?'var(--red)':pct>65?'var(--amber)':'var(--green)';
  } else pw.style.display='none';
  renderProyectos();renderIva(t.iva);renderFixed();renderVars();
}

function startEdit(i){editIdx=i;render();}
function cancelEdit(){editIdx=null;render();}
function saveEdit(i){
  const nombre=document.getElementById('ep-n').value.trim();
  const monto=parseFloat(document.getElementById('ep-m').value);
  if(!nombre||!monto)return;
  const m=getM();
  m.proyectos[i]={...m.proyectos[i],nombre,fechas:document.getElementById('ep-f').value.trim(),estado:document.getElementById('ep-e').value,monto,moneda:document.getElementById('ep-mon').value,factura:document.getElementById('ep-fac').value==='1',nota:document.getElementById('ep-nota').value.trim(),fechaProp:document.getElementById('ep-fp').value};
  editIdx=null;save();render();toast('Proyecto actualizado');
}

function renderIva(totalIva){
  const m=getM();const facs=m.proyectos.filter(p=>p.factura&&(PAGO_PCT[p.pago]??0)>0);
  const box=document.getElementById('ivaBox');
  if(!facs.length||!totalIva){box.style.display='none';return;}
  box.style.display='block';
  document.getElementById('ivaList').innerHTML=
    facs.map(p=>{const c=calcP(p);return `<div class="iva-row"><span class="iva-label">${p.nombre} (${c.pct}%)</span><span class="iva-val">${fmtCRCStr(c.iva)}</span></div>`;}).join('')+
    `<div class="iva-row"><span class="iva-label">Total IVA a pagar</span><span class="iva-val">${fmtCRCStr(totalIva)}</span></div>`;
}

function renderAnual(){
  const y=cy;document.getElementById('anualYear').textContent=y;
  const rows=[];let maxVal=1,totalC=0,totalG=0,totalI=0,bestM=null,bestV=0;
  for(let m=0;m<12;m++){const t=calcMonth(y,m);rows.push({m,t});maxVal=Math.max(maxVal,t.cob,t.gPag);totalC+=t.cob;totalG+=t.gPag;totalI+=t.iva;if(t.cob>bestV){bestV=t.cob;bestM=m;}}
  document.getElementById('anualChart').innerHTML=rows.map(({m,t})=>{
    const wC=Math.round((t.cob/maxVal)*100);const wG=Math.round((t.gPag/maxVal)*100);
    const cur=m===cm&&y===cy;
    return `<div class="bar-row">
      <div class="bar-mo" style="${cur?'color:var(--text);font-weight:700':''}">${MONTHS_S[m]}${cur?' ←':''}</div>
      <div class="bar-group">
        <div class="bar-track"><div class="bar-fill-g" style="width:${wC}%"></div></div>
        <div class="bar-track"><div class="bar-fill-r" style="width:${wG}%"></div></div>
        <div class="bar-nums">
          ${t.cob>0?`<span class="num-g">${fmtCRCStr(t.cob)}</span>`:'<span class="num-dim">sin datos</span>'}
          ${t.gPag>0?`<span class="num-r">${fmtCRCStr(t.gPag)}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  const bal=totalC-totalG;
  document.getElementById('anualResumen').innerHTML=`
    <div class="summary-row"><span class="sum-label">Total cobrado</span><span style="font-weight:600;color:var(--green)">${fmtCRCStr(totalC)}</span></div>
    <div class="summary-row"><span class="sum-label">Total gastos pagados</span><span style="font-weight:600;color:var(--red)">${fmtCRCStr(totalG)}</span></div>
    <div class="summary-row"><span class="sum-label">Balance neto del año</span><span style="font-weight:600;color:${bal>=0?'var(--green)':'var(--red)'}">${fmtCRCStr(bal)}</span></div>
    <div class="summary-row"><span class="sum-label">IVA total generado</span><span style="font-weight:600;color:var(--red)">${fmtCRCStr(totalI)}</span></div>
    ${bestM!==null&&bestV>0?`<div class="summary-row"><span class="sum-label">Mejor mes</span><span style="font-weight:600;color:var(--blue)">${MONTHS[bestM]} — ${fmtCRCStr(bestV)}</span></div>`:''}
  `;
}

function cycleEstado(i){const m=getM();m.proyectos[i].estado=next(ESTADO_ORDER,m.proyectos[i].estado||'confirmado');save();render();}
function cyclePago(i){const m=getM();m.proyectos[i].pago=next(PAGO_ORDER,m.proyectos[i].pago||'nopago');save();render();}
function removeProyecto(i){if(!confirm('¿Eliminar este proyecto?'))return;getM().proyectos.splice(i,1);save();render();toast('Proyecto eliminado');}

function addProyecto(){
  const nombre=document.getElementById('pNombre').value.trim();
  const monto=parseFloat(document.getElementById('pMonto').value);
  if(!nombre||!monto){toast('Completá nombre y monto');return;}
  getM().proyectos.push({nombre,fechas:document.getElementById('pFechas').value.trim(),estado:document.getElementById('pEstado').value,monto,moneda:document.getElementById('pMoneda').value,factura:document.getElementById('pFactura').value==='1',pago:'nopago',nota:document.getElementById('pNota').value.trim(),fechaProp:document.getElementById('pFechaProp').value});
  ['pNombre','pFechas','pMonto','pNota','pFechaProp'].forEach(id=>document.getElementById(id).value='');
  save();render();toast('Proyecto agregado ✓');
}

function toggleFixed(id,checked){getM().fixedPaid[id]=checked;save();render();}
function toggleVar(i,checked){getM().vars[i].paid=checked;save();render();}
function removeVar(i){getM().vars.splice(i,1);save();render();toast('Gasto eliminado');}
function addVar(){
  const desc=document.getElementById('vDesc').value.trim();
  const amt=parseFloat(document.getElementById('vAmt').value);
  if(!desc||!amt){toast('Completá descripción y monto');return;}
  getM().vars.push({desc,amount:amt,moneda:document.getElementById('vMoneda').value,paid:false});
  document.getElementById('vDesc').value='';document.getElementById('vAmt').value='';
  save();render();toast('Gasto agregado ✓');
}

// ─── EXCEL EXPORT ──────────────────────────────────────────────
function crcStr(n){return n>0?'₡'+Math.round(n).toLocaleString('es-CR'):'₡0';}

function xlsStyle(opts){
  return {
    font:{name:'Arial',sz:opts.sz||10,bold:!!opts.bold,color:{rgb:opts.color||'000000'}},
    fill:opts.fill?{patternType:'solid',fgColor:{rgb:opts.fill}}:{patternType:'none'},
    alignment:{horizontal:opts.align||'left',vertical:'center',wrapText:!!opts.wrap},
    border:{
      top:{style:'thin',color:{rgb:'DDDDDD'}},bottom:{style:'thin',color:{rgb:'DDDDDD'}},
      left:{style:'thin',color:{rgb:'DDDDDD'}},right:{style:'thin',color:{rgb:'DDDDDD'}}
    }
  };
}

function makeCell(v,opts){return {v,t:opts&&opts.num?'n':'s',s:xlsStyle(opts||{})};}

function addSheetFromRows(wb,sheetName,rows,colWidths){
  const ws={};let maxR=0,maxC=0;
  rows.forEach((row,r)=>{
    row.forEach((cell,c)=>{
      if(!cell)return;
      const ref=XLSX.utils.encode_cell({r,c});
      ws[ref]=cell;
      if(c>maxC)maxC=c;
    });
    if(r>maxR)maxR=r;
  });
  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR,c:maxC}});
  ws['!cols']=colWidths.map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
}

  const mesNombre=MONTHS[cm]+' '+cy;

    [makeCell('Concepto',{bold:true,sz:10,color:C_WHITE,fill:C_HEADER}),makeCell('Monto (₡)',{bold:true,sz:10,color:C_WHITE,fill:C_HEADER,align:'right'})],
    [makeCell('Cobrado / recibido',{fill:C_STRIPE}),makeCell(t.cob,{num:true,color:C_POS,bold:true,fill:C_STRIPE,align:'right'})],
    [makeCell('Por cobrar',{fill:C_AMBER_LIGHT}),makeCell(t.pend,{num:true,color:'885500',fill:C_AMBER_LIGHT,align:'right'})],
    [makeCell('Gastos pagados',{fill:C_RED_LIGHT}),makeCell(t.gPag,{num:true,color:C_NEG,fill:C_RED_LIGHT,align:'right'})],
    [makeCell('Gastos por pagar',{fill:C_STRIPE}),makeCell(t.gPend,{num:true,color:C_NEG,fill:C_STRIPE,align:'right'})],
    [makeCell('IVA a pagar a Hacienda',{fill:C_RED_LIGHT}),makeCell(t.iva,{num:true,color:C_NEG,fill:C_RED_LIGHT,align:'right'})],
    [makeCell('')],
    [makeCell('Balance real (cobrado - gastos pagados)',{bold:true,fill:balReal>=0?C_GREEN_LIGHT:C_RED_LIGHT}),makeCell(balReal,{num:true,bold:true,color:balReal>=0?C_POS:C_NEG,fill:balReal>=0?C_GREEN_LIGHT:C_RED_LIGHT,align:'right'})],
    [makeCell('Balance optimista (si todo lo pendiente entra)',{bold:true,fill:balOpt>=0?C_GREEN_LIGHT:C_RED_LIGHT}),makeCell(balOpt,{num:true,bold:true,color:balOpt>=0?C_POS:C_NEG,fill:balOpt>=0?C_GREEN_LIGHT:C_RED_LIGHT,align:'right'})],
    [makeCell('% de lo cobrado usado en gastos',{fill:C_STRIPE}),makeCell(pctGastado+'%',{fill:C_STRIPE,align:'right',color:pctGastado>90?C_NEG:pctGastado>65?'885500':C_POS})],
    [makeCell('')],
    [makeCell('Tipo de cambio usado',{fill:C_STRIPE,color:C_MUTED}),makeCell('$1 = ₡'+tc,{fill:C_STRIPE,color:C_MUTED,align:'right'})],
    [makeCell('Generado',{fill:C_STRIPE,color:C_MUTED}),makeCell(new Date().toLocaleDateString('es-CR'),{fill:C_STRIPE,color:C_MUTED,align:'right'})],
  ];
  addSheetFromRows(wb,'Resumen',resRows,[38,22]);

  // ═══════════════════════════════════════
  // HOJA 2: PROYECTOS
  // ═══════════════════════════════════════
  const projHeaders=[
    makeCell('PROYECTOS — '+mesNombre.toUpperCase(),{bold:true,sz:13,color:C_WHITE,fill:C_HEADER2,align:'center'}),
    makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),

    makeCell('TOTAL',{bold:true,fill:C_HEADER2,color:C_WHITE}),
    makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),
    makeCell(totProy.rec,{num:true,bold:true,fill:C_HEADER2,color:C_WHITE,align:'right'}),
    makeCell(totProy.iva,{num:true,bold:true,fill:C_HEADER2,color:C_WHITE,align:'right'}),
    makeCell('',{fill:C_HEADER2}),makeCell('',{fill:C_HEADER2}),
  ]);
  if(!m.proyectos.length) projRows.push([makeCell('Sin proyectos este mes',{color:C_MUTED})]);
  addSheetFromRows(wb,'Proyectos',projRows,[30,12,14,14,8,16,16,16,8,30]);

  // ═══════════════════════════════════════
  // HOJA 3: GASTOS
  // ═══════════════════════════════════════
  const gastRows=[
    [makeCell('GASTOS — '+mesNombre.toUpperCase(),{bold:true,sz:13,color:C_WHITE,fill:C_HEADER3,align:'center'}),makeCell('',{fill:C_HEADER3}),makeCell('',{fill:C_HEADER3}),makeCell('',{fill:C_HEADER3})],
    [makeCell('')],
    [makeCell('GASTOS FIJOS',{bold:true,sz:11,color:C_WHITE,fill:C_HEADER3})],
    [
      makeCell('Concepto',{bold:true,color:C_WHITE,fill:C_HEADER3}),
      makeCell('Monto (₡)',{bold:true,color:C_WHITE,fill:C_HEADER3,align:'right'}),
      makeCell('Estado',{bold:true,color:C_WHITE,fill:C_HEADER3}),
      makeCell('Nota',{bold:true,color:C_WHITE,fill:C_HEADER3}),
    ],
  ];
  let totFijoPag=0,totFijoPend=0;
  fx.forEach((r,i)=>{
    const pagado=m.fixedPaid[r.id];
    const fill=pagado?C_GREEN_LIGHT:(i%2===0?C_WHITE:C_STRIPE);
    if(pagado)totFijoPag+=r.amt;else totFijoPend+=r.amt;
    gastRows.push([
      makeCell(r.name,{fill,bold:true}),
      makeCell(r.amt,{num:true,fill,align:'right',color:pagado?C_POS:C_NEG}),
      makeCell(pagado?'✓ Pagado':'Pendiente',{fill,color:pagado?C_POS:C_NEG,bold:true}),
      makeCell(r.note||'',{fill,color:C_MUTED}),
    ]);
  });
  gastRows.push([
    makeCell('TOTAL FIJOS',{bold:true,fill:C_HEADER3,color:C_WHITE}),
    makeCell(totFijoPag+totFijoPend,{num:true,bold:true,fill:C_HEADER3,color:C_WHITE,align:'right'}),
    makeCell('Pagado: ₡'+Math.round(totFijoPag).toLocaleString('es-CR'),{fill:C_HEADER3,color:C_WHITE}),
    makeCell('Pendiente: ₡'+Math.round(totFijoPend).toLocaleString('es-CR'),{fill:C_HEADER3,color:C_WHITE}),
  ]);
  gastRows.push([makeCell('')]);
  gastRows.push([makeCell('GASTOS VARIABLES',{bold:true,sz:11,color:C_WHITE,fill:C_HEADER3})]);
  gastRows.push([
    makeCell('Descripción',{bold:true,color:C_WHITE,fill:C_HEADER3}),
    makeCell('Monto (₡)',{bold:true,color:C_WHITE,fill:C_HEADER3,align:'right'}),
    makeCell('Moneda original',{bold:true,color:C_WHITE,fill:C_HEADER3}),
    makeCell('Estado',{bold:true,color:C_WHITE,fill:C_HEADER3}),
  ]);
  let totVarPag=0,totVarPend=0;
  m.vars.forEach((v,i)=>{
    const col=toCol(v.amount,v.moneda||'CRC');
    const fill=v.paid?C_GREEN_LIGHT:(i%2===0?C_WHITE:C_STRIPE);
    const origStr=(v.moneda==='USD')?'$'+v.amount:('₡'+Math.round(v.amount).toLocaleString('es-CR'));
    if(v.paid)totVarPag+=col;else totVarPend+=col;
    gastRows.push([
      makeCell(v.desc,{fill,bold:true}),
      makeCell(col,{num:true,fill,align:'right',color:v.paid?C_POS:C_NEG}),
      makeCell(origStr+' ('+( v.moneda||'CRC')+')',{fill,color:C_MUTED}),
      makeCell(v.paid?'✓ Pagado':'Pendiente',{fill,color:v.paid?C_POS:C_NEG,bold:true}),
    ]);
  });
  if(!m.vars.length) gastRows.push([makeCell('Sin gastos variables',{color:C_MUTED})]);
  gastRows.push([
    makeCell('TOTAL VARIABLES',{bold:true,fill:C_HEADER3,color:C_WHITE}),
    makeCell(totVarPag+totVarPend,{num:true,bold:true,fill:C_HEADER3,color:C_WHITE,align:'right'}),
    makeCell('Pagado: ₡'+Math.round(totVarPag).toLocaleString('es-CR'),{fill:C_HEADER3,color:C_WHITE}),
    makeCell('Pendiente: ₡'+Math.round(totVarPend).toLocaleString('es-CR'),{fill:C_HEADER3,color:C_WHITE}),
  ]);
  addSheetFromRows(wb,'Gastos',gastRows,[30,18,20,14]);

  // ═══════════════════════════════════════
  // HOJA 4: VISTA ANUAL
  // ═══════════════════════════════════════
  const anualRows=[
    [makeCell('VISTA ANUAL — '+cy,{bold:true,sz:13,color:C_WHITE,fill:C_HEADER4,align:'center'}),makeCell('',{fill:C_HEADER4}),makeCell('',{fill:C_HEADER4}),makeCell('',{fill:C_HEADER4}),makeCell('',{fill:C_HEADER4}),makeCell('',{fill:C_HEADER4})],
    [makeCell('')],
    [
      makeCell('Mes',{bold:true,color:C_WHITE,fill:C_HEADER4}),
      makeCell('Cobrado (₡)',{bold:true,color:C_WHITE,fill:C_HEADER4,align:'right'}),
      makeCell('Gastos pagados (₡)',{bold:true,color:C_WHITE,fill:C_HEADER4,align:'right'}),
      makeCell('Balance (₡)',{bold:true,color:C_WHITE,fill:C_HEADER4,align:'right'}),
      makeCell('IVA (₡)',{bold:true,color:C_WHITE,fill:C_HEADER4,align:'right'}),
      makeCell('% Gastado',{bold:true,color:C_WHITE,fill:C_HEADER4,align:'right'}),
    ],
  ];
  let anTotC=0,anTotG=0,anTotI=0;
  for(let mo=0;mo<12;mo++){
    const t2=calcMonth(cy,mo);
    const b=t2.cob-t2.gPag;
    const pct2=t2.cob>0?Math.round((t2.gPag/t2.cob)*100):0;
    const isCur=mo===cm;
    const fill=isCur?C_AMBER_LIGHT:(mo%2===0?C_WHITE:C_STRIPE);
    anTotC+=t2.cob;anTotG+=t2.gPag;anTotI+=t2.iva;
    anualRows.push([
      makeCell(MONTHS[mo]+(isCur?' ◀ Mes actual':''),{fill,bold:isCur}),
      makeCell(t2.cob,{num:true,fill,color:t2.cob>0?C_POS:C_MUTED,align:'right'}),
      makeCell(t2.gPag,{num:true,fill,color:t2.gPag>0?C_NEG:C_MUTED,align:'right'}),
      makeCell(b,{num:true,fill,color:b>=0?C_POS:C_NEG,bold:true,align:'right'}),
      makeCell(t2.iva,{num:true,fill,color:t2.iva>0?C_NEG:C_MUTED,align:'right'}),
      makeCell(t2.cob>0?pct2+'%':'—',{fill,align:'right',color:pct2>90?C_NEG:pct2>65?'885500':C_POS}),
    ]);
  }
  const anBal=anTotC-anTotG;
  anualRows.push([makeCell('')]);
  anualRows.push([
    makeCell('TOTAL AÑO',{bold:true,fill:C_HEADER4,color:C_WHITE}),
    makeCell(anTotC,{num:true,bold:true,fill:C_HEADER4,color:C_WHITE,align:'right'}),
    makeCell(anTotG,{num:true,bold:true,fill:C_HEADER4,color:C_WHITE,align:'right'}),
    makeCell(anBal,{num:true,bold:true,fill:C_HEADER4,color:C_WHITE,align:'right'}),
    makeCell(anTotI,{num:true,bold:true,fill:C_HEADER4,color:C_WHITE,align:'right'}),
    makeCell('',{fill:C_HEADER4}),
  ]);
  addSheetFromRows(wb,'Vista Anual',anualRows,[18,20,22,18,16,12]);

  // Guardar
  const fecha=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`tracker-${cy}-${String(cm+1).padStart(2,'0')}-${fecha}.xlsx`);
  toast('Excel generado ✓');
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();toast('Backup descargado ✓');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{data=JSON.parse(ev.target.result);save();render();toast('Datos importados ✓');}catch(e){toast('Error: archivo inválido');}};
  r.readAsText(file);e.target.value='';
}

function buildSel(){
  const sel=document.getElementById('monthSel');
  for(let y=2026;y<=2029;y++)for(let m=0;m<12;m++){
    if(y===2026&&m<now.getMonth())continue;
    const o=document.createElement('option');
    o.value=`${y}-${m}`;o.textContent=`${MONTHS[m]} ${y}`;
    if(y===cy&&m===cm)o.selected=true;
    sel.appendChild(o);
  }
  sel.addEventListener('change',()=>{const[y,m]=sel.value.split('-').map(Number);cy=y;cm=m;editIdx=null;render();});
}
document.getElementById('tcInput').addEventListener('input',render);
buildSel();render();
</script>
